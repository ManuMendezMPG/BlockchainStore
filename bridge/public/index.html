<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameStore — Puente web</title>

    <!--
      ethers.js v6 cargado como build UMD desde un CDN.
      UMD = expone una variable global `ethers` (window.ethers), así no
      necesitamos bundler ni "import". Stack mínimo: solo HTML + JS.
    -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>

    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { margin-bottom: 0.2rem; }
      button {
        cursor: pointer;
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        border: 1px solid #888;
        background: #f3f3f3;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .card {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 0.8rem 1rem;
        margin: 0.6rem 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .muted { color: #777; font-size: 0.9rem; }
      .mono { font-family: ui-monospace, monospace; }
      #status { padding: 0.6rem 1rem; border-radius: 8px; margin: 1rem 0; }
      #status.ok { background: #e6f5e6; }
      #status.warn { background: #fff4e0; }
      #status.error { background: #fde0e0; }
      .hidden { display: none; }
      section { margin-top: 2rem; }
    </style>
  </head>

  <body>
    <h1>🎮 GameStore</h1>
    <p class="muted">
      Puente web local: conecta con MetaMask y compra items (ERC-1155) en la red
      Anvil. La clave privada nunca sale de MetaMask; esta página solo construye
      las llamadas.
    </p>

    <!-- Conexión -->
    <button id="connectBtn">Conectar wallet</button>
    <div id="account" class="muted"></div>
    <div id="network" class="muted"></div>

    <!-- Mensajes de estado / error visibles para el usuario -->
    <div id="status" class="hidden"></div>

    <!-- Tienda -->
    <section>
      <h2>Tienda</h2>
      <div id="store"></div>
    </section>

    <!-- Inventario del jugador -->
    <section>
      <h2>Tu inventario</h2>
      <div id="inventory" class="muted">Conecta tu wallet para ver tu inventario.</div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
