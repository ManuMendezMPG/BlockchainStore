[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Versión de Solidity fijada para builds reproducibles.
# OpenZeppelin v5 requiere ^0.8.20; usamos una reciente y estable.
solc = "0.8.28"

# Remappings: alias de import -> ruta real dentro de lib/.
# Permiten escribir `import "@openzeppelin/contracts/..."` en vez de rutas largas.
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
